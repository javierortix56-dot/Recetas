<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D9A6B"/>
      <stop offset="100%" stop-color="#1a6644"/>
    </linearGradient>
    <linearGradient id="bun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5DFA0"/>
      <stop offset="100%" stop-color="#E8C56A"/>
    </linearGradient>
    <linearGradient id="patty" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C0622A"/>
      <stop offset="100%" stop-color="#8B3A10"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle texture lines -->
  <line x1="0" y1="512" x2="512" y2="0" stroke="white" stroke-width="1" opacity="0.05"/>
  <line x1="-100" y1="512" x2="412" y2="0" stroke="white" stroke-width="1" opacity="0.04"/>
  <line x1="100" y1="512" x2="612" y2="0" stroke="white" stroke-width="1" opacity="0.04"/>

  <!-- Top bun dome -->
  <path d="M104 258 C104 168 408 168 408 258 L408 272 Q408 284 396 284 L116 284 Q104 284 104 272 Z"
        fill="url(#bun)" filter="url(#shadow)"/>

  <!-- Sesame seeds on top bun -->
  <ellipse cx="188" cy="224" rx="13" ry="7" fill="#C0922A" opacity="0.55" transform="rotate(-15 188 224)"/>
  <ellipse cx="256" cy="206" rx="13" ry="7" fill="#C0922A" opacity="0.55"/>
  <ellipse cx="324" cy="220" rx="13" ry="7" fill="#C0922A" opacity="0.55" transform="rotate(12 324 220)"/>

  <!-- Lettuce / green layer -->
  <path d="M90 290 Q120 278 150 292 Q180 304 210 290 Q240 278 270 292 Q300 304 330 290 Q360 278 390 290 L410 296 Q410 312 398 316 L114 316 Q102 312 90 310 Z"
        fill="#4CAF6A" filter="url(#shadow)"/>

  <!-- Cheese slice -->
  <rect x="94" y="320" width="324" height="22" rx="5"
        fill="#F5C842" filter="url(#shadow)"/>

  <!-- Patty -->
  <rect x="100" y="346" width="312" height="42" rx="10"
        fill="url(#patty)" filter="url(#shadow)"/>

  <!-- Bottom bun -->
  <path d="M116 392 L396 392 Q412 392 412 406 L412 414 Q412 344 256 344 Q100 344 100 414 L100 406 Q100 392 116 392 Z"
        fill="none"/>
  <rect x="100" y="392" width="312" height="36" rx="16"
        fill="url(#bun)" filter="url(#shadow)"/>

  <!-- Shine on top bun -->
  <ellipse cx="218" cy="216" rx="62" ry="22" fill="white" opacity="0.12" transform="rotate(-10 218 216)"/>
</svg>
